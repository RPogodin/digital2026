<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 720px;
            margin: 40px auto;
            line-height: 1.6;
            padding: 0 16px;
        }
        .card {
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 20px;
            background: #f6f8fa;
        }
        code {
            background: #ffffff;
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{.Title}}</h1>
        <p>Это HTML-страница, которую собрал сервер через <code>html/template</code>.</p>
        <p><strong>Текущее время сервера:</strong> {{.ServerTime}}</p>
        <p><strong>Путь запроса:</strong> {{.RequestPath}}</p>
    </div>
</body>
</html>
